version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      three:
        patterns:
          - "three"
          - "@types/three"
          - "@pixiv/three-vrm"
          - "@react-three/*"
      tauri:
        patterns:
          - "@tauri-apps/*"
      shadcn:
        patterns:
          - "@base-ui/*"
          - "class-variance-authority"
          - "tailwindcss"
          - "@tailwindcss/*"
          - "tw-animate-css"
      eslint:
        patterns:
          - "eslint"
          - "eslint-plugin-*"
          - "@eslint/*"
          - "typescript-eslint"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
